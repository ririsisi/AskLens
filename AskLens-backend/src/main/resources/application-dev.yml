project:
  name: AskLens-backend
  version: 1.0.0

server:
  port: 10001

spring:
  application:
    name: asklens-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:asklens}
    username: ${DB_USERNAME:your-db-username}
    password: ${DB_PASSWORD:your-db-password}
    driver-class-name: org.postgresql.Driver

  # ──────────────────────────────────────────────
  # Spring AI Alibaba — DashScope 原生配置
  # ──────────────────────────────────────────────
  ai:
    model:
      chat: dashscope
      embedding: openai
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}
      chat:
        options:
          model: qwen-plus
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-compatible-api-key}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      embedding:
        options:
          # 指定维度，确保与数据库表结构一致
          dimensions: 512
          model: text-embedding-v3
          # 单个输入超过模型 context length 时由 Ollama 截断，避免上传链路直接失败。
          truncate: true

    # 下面是 Ollama 相关配置，使用的话需要自己部署ollama对应的向量模型，然后放开spring-ai-starter-model-ollama，注释掉spring-ai-starter-model-openai
#    model:
#      chat: dashscope
#      embedding: ollama
#    dashscope:
#      api-key: ${DASHSCOPE_API_KEY:}
#      chat:
#        options:
#          model: glm-5
#    ollama:
#      base-url: http://localhost:11434
#      embedding:
#        options:
#          model: qllama/bge-small-zh-v1.5
#          # 单个输入超过模型 context length 时由 Ollama 截断，避免上传链路直接失败。
#          truncate: true



    # PGvector 向量存储（复用已有 PostgreSQL）
    vectorstore:
      pgvector:
        dimensions: 512
        index-type: hnsw
        distance-type: cosine_distance

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:your-minio-access-key}
    secret-key: ${MINIO_SECRET_KEY:your-minio-secret-key}
    bucket: ${MINIO_BUCKET:asklens-documents}

rag:
  auth:
    jwt-secret: ${ASKLENS_JWT_SECRET:change-me-to-a-32byte-secret-key}
    issuer: asklens
    access-token-expire-minutes: 30
    refresh-token-expire-days: 14
    refresh-cookie-name: ASKLENS_REFRESH_TOKEN
    refresh-cookie-secure: false
  dev-admin:
    username: ${ASKLENS_DEV_ADMIN_USERNAME:your-admin-username}
    email: ${ASKLENS_DEV_ADMIN_EMAIL:your-admin-email@example.com}
    display-name: ${ASKLENS_DEV_ADMIN_DISPLAY_NAME:your-display-name}
    password: ${ASKLENS_DEV_ADMIN_PASSWORD:your-admin-password}
    user-code: ${ASKLENS_DEV_ADMIN_USER_CODE:your-admin-code}

elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  scheme: ${ES_SCHEME:http}
  index-name: asklens_document_chunks

ingestion:
  chunking:
    target-tokens: 240
    max-tokens: 320
    overlap-tokens: 32
  vector:
    # 控制业务侧每次调用 VectorStore.add 的 chunk 数量，降低单次 Ollama embedding 请求压力。
    add-batch-size: 9
